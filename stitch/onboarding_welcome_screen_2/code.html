<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6467f2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101122",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .soft-glow {
            box-shadow: 0 0 40px -10px rgba(100, 103, 242, 0.3);
        }
        .step-gradient {
            background: linear-gradient(135deg, rgba(100, 103, 242, 0.1) 0%, rgba(16, 17, 34, 0) 100%);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<header class="flex items-center justify-between whitespace-nowrap border-b border-slate-200 dark:border-slate-800 px-6 md:px-20 py-4">
<div class="flex items-center gap-3">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined text-xl">auto_awesome_motion</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-tight">NoteStream</h2>
</div>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center rounded-lg h-10 px-4 text-slate-500 dark:text-slate-400 text-sm font-medium hover:text-primary transition-colors">
<span class="truncate">Save &amp; Exit</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-start pt-12 pb-20 px-6">
<div class="w-full max-w-2xl">
<div class="flex flex-col gap-4 mb-12">
<div class="flex items-center justify-between">
<span class="text-primary text-sm font-semibold tracking-wider uppercase">Onboarding • Step 1 of 3</span>
<span class="text-slate-500 dark:text-slate-400 text-sm font-medium">33% Complete</span>
</div>
<div class="h-1.5 w-full bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/3 rounded-full"></div>
</div>
</div>
<div class="space-y-2 mb-10">
<h1 class="text-slate-900 dark:text-slate-100 text-4xl font-bold tracking-tight">Welcome to NoteStream</h1>
<p class="text-slate-600 dark:text-slate-400 text-lg">Let's set up your workspace to match your flow.</p>
</div>
<div class="grid gap-8">
<section class="p-6 rounded-xl border border-slate-200 dark:border-slate-800 bg-white/50 dark:bg-slate-900/50 backdrop-blur-sm soft-glow">
<div class="flex items-center gap-3 mb-6">
<span class="material-symbols-outlined text-primary">edit_square</span>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-semibold">Workspace Details</h3>
</div>
<div class="space-y-4">
<label class="block">
<span class="text-sm font-medium text-slate-700 dark:text-slate-300 mb-1.5 block">Workspace Name</span>
<input class="w-full bg-slate-100 dark:bg-slate-800 border-none rounded-lg py-3 px-4 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary outline-none transition-all" placeholder="e.g. Design Team, Personal Vault" type="text"/>
</label>
</div>
</section>
<section>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-semibold mb-4">How will you use NoteStream?</h3>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
<button class="flex flex-col items-start p-5 rounded-xl border-2 border-primary bg-primary/5 text-left transition-all">
<span class="material-symbols-outlined text-primary mb-3">person</span>
<span class="font-bold text-slate-900 dark:text-slate-100">Personal</span>
<span class="text-xs text-slate-500 dark:text-slate-400 mt-1">Organize your life and thoughts.</span>
</button>
<button class="flex flex-col items-start p-5 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-primary/50 bg-transparent text-left transition-all">
<span class="material-symbols-outlined text-slate-400 mb-3">business_center</span>
<span class="font-bold text-slate-900 dark:text-slate-100">Work</span>
<span class="text-xs text-slate-500 dark:text-slate-400 mt-1">Collaborate with your professional team.</span>
</button>
<button class="flex flex-col items-start p-5 rounded-xl border border-slate-200 dark:border-slate-800 hover:border-primary/50 bg-transparent text-left transition-all">
<span class="material-symbols-outlined text-slate-400 mb-3">school</span>
<span class="font-bold text-slate-900 dark:text-slate-100">School</span>
<span class="text-xs text-slate-500 dark:text-slate-400 mt-1">Keep track of lectures and research.</span>
</button>
</div>
</section>
<section class="p-6 rounded-xl border border-dashed border-slate-300 dark:border-slate-700">
<div class="flex items-center justify-between mb-4">
<div>
<h3 class="text-slate-900 dark:text-slate-100 text-lg font-semibold">Invite your team</h3>
<p class="text-sm text-slate-500 dark:text-slate-400">Collaboration is better together.</p>
</div>
<span class="material-symbols-outlined text-slate-400">group_add</span>
</div>
<div class="flex gap-2">
<input class="flex-1 bg-slate-100 dark:bg-slate-800 border-none rounded-lg py-2 px-4 text-slate-900 dark:text-slate-100 focus:ring-1 focus:ring-primary outline-none text-sm" placeholder="colleague@example.com" type="email"/>
<button class="bg-slate-200 dark:bg-slate-700 hover:bg-slate-300 dark:hover:bg-slate-600 px-4 py-2 rounded-lg text-sm font-semibold transition-colors">Add</button>
</div>
</section>
</div>
<div class="mt-12 flex items-center justify-between gap-4">
<button class="text-slate-500 dark:text-slate-400 font-medium hover:text-slate-700 dark:hover:text-slate-200 transition-colors">
                        Skip for now
                    </button>
<button class="flex items-center gap-2 bg-primary hover:bg-primary/90 text-white px-8 py-4 rounded-xl font-bold text-lg shadow-lg shadow-primary/20 transition-all transform hover:scale-[1.02] active:scale-[0.98]">
<span>Get Started</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</main>
<div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
</div>
</div>
<div class="fixed top-1/4 -right-20 w-64 h-64 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-1/4 -left-20 w-64 h-64 bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
