<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>

<title>NoteStream - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

                        "background-dark": "#101122",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]

                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .glass-panel {
            background: rgba(25, 26, 51, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: 'Inter', sans-serif;
        }

<body class="bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<div class="relative flex min-h-screen w-full flex-col overflow-x-hidden">
<header class="flex items-center justify-between px-6 py-4 md:px-12">
<div class="flex items-center gap-2">
<div class="flex items-center justify-center size-10 rounded-xl bg-primary text-white">
<span class="material-symbols-outlined text-2xl">auto_awesome_motion</span>
</div>
<h1 class="text-slate-900 dark:text-white text-xl font-bold tracking-tight">NoteStream</h1>
</div>
<div class="flex items-center gap-4">
<span class="hidden md:block text-slate-500 dark:text-slate-400 text-sm">New to NoteStream?</span>
<button class="text-primary font-semibold text-sm hover:underline">Create account</button>
</div>
</header>
<main class="flex-1 flex items-center justify-center p-6 relative">
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[10%] -left-[10%] w-[40%] h-[40%] bg-primary/10 rounded-full blur-[120px]"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"></div>
</div>
<div class="w-full max-w-[440px] z-10">
<div class="glass-panel rounded-xl p-8 shadow-2xl">
<div class="mb-8">
<h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">Welcome back</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm">Please enter your details to sign in to your account.</p>
</div>
<div class="grid grid-cols-2 gap-4 mb-8">
<button class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 hover:bg-white/10 transition-all text-sm font-medium">
<img alt="" class="size-5" data-alt="Google colorful G logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBEDebCyFAODLzwa6PCnHEbOGbOLEn5Vbe-7VNllisv1DWtkvCRaG2SogfXFh2tViT83P_Ze6q6RSZvsRn_g_kdn165PW0Z7Rx2Eh58htPORFAabO7mc_r6DJyRuc5KHxnzJMX4bVlpCcYVfJED4-K-logzLWNeOZF774tln4BiAOPAHW1blgT34z9GEnCkqYnDPgcucctN7kCAr-QG9UdX1ePdkXufoCG2SZhRVRb5oRkm8eagqyqqC7SqkMk052CnWPGueupNoOw"/>
<span>Google</span>
</button>
<button class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-lg border border-slate-200 dark:border-slate-800 bg-white/5 hover:bg-white/10 transition-all text-sm font-medium">
<svg class="size-5 fill-current" viewbox="0 0 24 24"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.43.372.823 1.102.823 2.222 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path></svg>
<span>GitHub</span>
</button>
</div>
<div class="relative mb-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-slate-200 dark:border-slate-800"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="bg-slate-900/0 dark:bg-background-dark/0 px-2 text-slate-500 backdrop-blur-md">Or continue with</span>
</div>
</div>
<form class="space-y-5" onsubmit="return false;">
<div class="space-y-2">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300 ml-1">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">mail</span>
<input class="w-full bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-lg py-3 pl-11 pr-4 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all text-sm placeholder:text-slate-500" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="text-sm font-medium text-slate-700 dark:text-slate-300">Password</label>
<button class="text-xs text-primary hover:underline">Forgot password?</button>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-xl">lock</span>
<input class="w-full bg-slate-100 dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-lg py-3 pl-11 pr-12 focus:ring-2 focus:ring-primary/50 focus:border-primary outline-none transition-all text-sm placeholder:text-slate-500" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-2 ml-1">
<input class="rounded border-slate-300 dark:border-slate-700 bg-transparent text-primary focus:ring-primary" id="remember" type="checkbox"/>
<label class="text-xs text-slate-500 dark:text-slate-400" for="remember">Remember me for 30 days</label>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-3 rounded-lg transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                            Sign In
                            <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
</div>
<div class="mt-8 flex flex-col items-center gap-6">
<div class="flex items-center gap-8">
<div class="flex flex-col items-center gap-1">
<span class="text-slate-900 dark:text-white font-bold text-lg">2.5k+</span>
<span class="text-slate-500 text-[10px] uppercase tracking-wider">Active Streamers</span>
</div>
<div class="w-px h-8 bg-slate-800"></div>
<div class="flex flex-col items-center gap-1">
<span class="text-slate-900 dark:text-white font-bold text-lg">99.9%</span>
<span class="text-slate-500 text-[10px] uppercase tracking-wider">Uptime</span>
</div>
<div class="w-px h-8 bg-slate-800"></div>
<div class="flex flex-col items-center gap-1">
<span class="text-slate-900 dark:text-white font-bold text-lg">256-bit</span>
<span class="text-slate-500 text-[10px] uppercase tracking-wider">Encryption</span>
</div>
</div>
</div>
</div>

<footer class="px-6 py-8 md:px-12 flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-slate-500">
<div class="flex gap-6">
<a class="hover:text-primary transition-colors" href="#">Privacy Policy</a>
<a class="hover:text-primary transition-colors" href="#">Terms of Service</a>
<a class="hover:text-primary transition-colors" href="#">Cookies</a>

</div>
