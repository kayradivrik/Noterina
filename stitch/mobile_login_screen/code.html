<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6467f2",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101122",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }

<title>NoteStream - Login</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background-light dark:bg-background-dark overflow-x-hidden">
<!-- Header / Navigation -->
<div class="flex items-center p-4 pb-2 justify-between">
<div class="text-slate-900 dark:text-slate-100 flex size-12 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</div>
<div class="flex-1 flex justify-center pr-12">
<div class="flex items-center gap-2">
<div class="size-8 bg-primary rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white text-xl">sticky_note_2</span>
</div>
<h2 class="text-slate-900 dark:text-slate-100 text-lg font-bold leading-tight tracking-[-0.015em]">NoteStream</h2>
</div>
</div>
</div>
<!-- Hero Section -->
<div class="px-6 pt-10 pb-4">
<h1 class="text-slate-900 dark:text-slate-100 tracking-tight text-[32px] font-bold leading-tight text-left">Welcome back</h1>
<p class="text-slate-600 dark:text-slate-400 text-base font-normal leading-normal mt-2">Sign in to continue your workflow and access your synced notes.</p>
</div>
<!-- Social Login Buttons -->
<div class="px-6 py-4 flex flex-col gap-3">
<button class="flex items-center justify-center gap-3 w-full h-14 rounded-xl border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 hover:bg-slate-50 dark:hover:bg-primary/10 transition-colors">
<img alt="" class="size-5" data-alt="Google colorful brand logo icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCsVLNyw6peVqoHU04pOJ0JlkVfTZPEtSz1w3bQ0ANxGTGPCO8f9Jwiidwpa1U3Om8AIDrvXbUKnTUzNFR2rI320au-JvnqIO3l0ebX5tVGHpwGc2FNx6kg1LS-CYwm0kgSFuOAsx_1nXFndjsAA13bJN9LVZEMNaxtQ38dM5R9Z4a2oVK_quzvuJPRSaGfnjpzuBMgIqCg1CYBzOK4mfi97_eIN33MBhbcXH8hG4oCqHLygUxdRQJBtv0tsuQ_nqqJlvDCdNUCboM"/>
<span class="font-medium">Continue with Google</span>
</button>
<button class="flex items-center justify-center gap-3 w-full h-14 rounded-xl border border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 hover:bg-slate-50 dark:hover:bg-primary/10 transition-colors">
<svg class="size-6 fill-slate-900 dark:fill-white" viewbox="0 0 24 24">
<path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.43.372.823 1.102.823 2.222 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"></path>
</svg>
<span class="font-medium">Continue with GitHub</span>
</button>
</div>
<!-- Divider -->
<div class="px-6 py-4 flex items-center gap-4">
<div class="h-px flex-1 bg-slate-200 dark:bg-primary/20"></div>
<span class="text-sm text-slate-500 dark:text-slate-400 font-medium">OR</span>
<div class="h-px flex-1 bg-slate-200 dark:bg-primary/20"></div>
</div>
<!-- Login Form -->
<div class="px-6 py-2 flex flex-col gap-4">
<div class="flex flex-col gap-2">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Email address</label>
<input class="form-input w-full rounded-xl border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-slate-900 dark:text-white focus:ring-primary focus:border-primary h-14 px-4 placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-all" placeholder="name@company.com" type="email"/>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-sm font-semibold text-slate-700 dark:text-slate-300">Password</label>
<button class="text-sm font-semibold text-primary hover:underline">Forgot?</button>
</div>
<div class="relative">
<input class="form-input w-full rounded-xl border-slate-200 dark:border-primary/20 bg-white dark:bg-primary/5 text-slate-900 dark:text-white focus:ring-primary focus:border-primary h-14 px-4 pr-12 placeholder:text-slate-400 dark:placeholder:text-slate-500 transition-all" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 flex items-center pr-4 text-slate-400 cursor-pointer">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</div>
<div class="flex items-center gap-2 mt-2">
<input class="size-5 rounded border-slate-300 dark:border-primary/40 text-primary focus:ring-primary bg-transparent" id="remember" type="checkbox"/>
<label class="text-sm text-slate-600 dark:text-slate-400" for="remember">Keep me signed in</label>
</div>
<button class="mt-4 w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl shadow-lg shadow-primary/20 transition-all active:scale-[0.98]">
                Sign In
            </button>
</div>
<!-- Footer Signup Link -->
<div class="mt-auto px-6 py-8 text-center">
<p class="text-slate-600 dark:text-slate-400">
                Don't have an account? 
                <a class="text-primary font-bold hover:underline" href="#">Create account</a>
</p>
</div>
<!-- Abstract Background Element -->
<div class="fixed -bottom-24 -right-24 size-64 bg-primary/10 blur-[100px] rounded-full -z-10"></div>
<div class="fixed -top-24 -left-24 size-64 bg-primary/10 blur-[100px] rounded-full -z-10"></div>
</div>
</body></html>
